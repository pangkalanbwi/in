<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dapur - RM Pangkalan</title>
    
    <meta name="theme-color" content="#dc2626"> <!-- Warna Merah untuk Dapur -->
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #111827; color: white; }
        
        /* Animasi Ping untuk pesanan baru */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .new-order-pulse { animation: pulse-red 2s infinite; border: 2px solid #ef4444; }

        .card-cooking { border-left: 6px solid #f59e0b; } /* Kuning */
        .card-ready { border-left: 6px solid #10b981; } /* Hijau */
        .card-pending { border-left: 6px solid #ef4444; } /* Merah */

        /* Timer styling */
        .timer-badge {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="p-4 lg:p-8 min-h-screen">

    <!-- Header -->
    <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-700">
        <div>
            <h1 class="text-3xl font-black text-white flex items-center gap-3">
                <i data-lucide="chef-hat" class="text-red-500"></i> KDS PANGKALAN
            </h1>
            <p class="text-gray-400 text-sm mt-1" id="last-sync">Sinkronisasi otomatis...</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700">
                <span class="text-gray-400 text-xs uppercase font-bold">Jumlah Antrian</span>
                <p id="queue-count" class="text-2xl font-black text-red-500 text-center">0</p>
            </div>
            <button onclick="refreshData()" class="p-3 bg-gray-800 rounded-full hover:bg-gray-700 transition border border-gray-700">
                <i data-lucide="refresh-cw" class="text-white"></i>
            </button>
            <button onclick="logout()" class="p-3 bg-red-900/50 rounded-full hover:bg-red-600 transition text-red-200">
                <i data-lucide="log-out"></i>
            </button>
        </div>
    </header>

    <!-- Stats Ringkas -->
    <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-red-900/20 p-4 rounded-xl border border-red-900/50 text-center">
            <p class="text-red-400 text-xs uppercase font-bold mb-1">Menunggu Masak</p>
            <p id="stat-pending" class="text-3xl font-black text-white">0</p>
        </div>
        <div class="bg-yellow-900/20 p-4 rounded-xl border border-yellow-900/50 text-center">
            <p class="text-yellow-400 text-xs uppercase font-bold mb-1">Sedang Dimasak</p>
            <p id="stat-cooking" class="text-3xl font-black text-white">0</p>
        </div>
        <div class="bg-green-900/20 p-4 rounded-xl border border-green-900/50 text-center">
            <p class="text-green-400 text-xs uppercase font-bold mb-1">Siap Saji</p>
            <p id="stat-ready" class="text-3xl font-black text-white">0</p>
        </div>
    </div>

    <!-- Grid Pesanan -->
    <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Pesanan akan dirender di sini via JS -->
        <div class="col-span-full text-center py-20 opacity-50 text-gray-500">
            <i data-lucide="utensils-crossed" size="48" class="mb-4 mx-auto"></i>
            <p class="text-lg font-bold">Tidak ada pesanan aktif saat ini.</p>
        </div>
    </div>

    <!-- Audio notifikasi (Opsional) -->
    <audio id="bell-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwN3BrT3us2zAikLxg5T9wmwi8yur5NDXdPU8o45Gn1WBv3uRl9uG4MxE1elZ47vchH/exec";
        
        let state = {
            transaksi: [],
            lastCount: 0
        };

        /* --- API CONNECTION --- */
        async function syncKitchen() {
            try {
                // Kita ambil semua data, tapi fokus ke Transaksi
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'sync_all' })
                });
                const json = await res.json();
                
                if(json.status === 'success' && json.data && json.data.Transaksi) {
                    const oldIDs = new Set(state.transaksi.map(t => t.ID_Transaksi));
                    state.transaksi = json.data.Transaksi;
                    const newIDs = new Set(state.transaksi.map(t => t.ID_Transaksi));

                    // Cek jika ada pesanan baru (bunyikan bel)
                    // Jika jumlah pesanan 'Menunggu Pembayaran' lebih banyak dari sebelumnya
                    const pendingOrders = state.transaksi.filter(t => t.Status === 'Menunggu Pembayaran');
                    if (pendingOrders.length > state.lastCount) {
                        playNotification();
                    }
                    state.lastCount = pendingOrders.length;

                    renderKitchen();
                    updateStats();
                    
                    document.getElementById('last-sync').innerText = "Terupdate: " + new Date().toLocaleTimeString('id-ID');
                    document.getElementById('queue-count').innerText = pendingOrders.length;
                }
            } catch (e) {
                console.error("Sync Error", e);
            }
        }

        /* --- UPDATE STATUS --- */
        async function updateStatus(trxId, newStatus) {
            if(!confirm("Ubah status pesanan ini menjadi '" + newStatus + "'?")) return;

            try {
                // Panggil fungsi update_data di code.gs
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'update_data',
                        data: {
                            targetSheet: 'Transaksi',
                            id: trxId,
                            column: 'Status',
                            newValue: newStatus
                        }
                    })
                });
                
                // Refresh data
                syncKitchen();
            } catch (e) {
                alert("Gagal update status: " + e);
            }
        }

        /* --- RENDER UI --- */
        function renderKitchen() {
            const grid = document.getElementById('kitchen-grid');
            
            // Filter hanya pesanan yang belum Lunas/Selesai
            const activeOrders = state.transaksi.filter(t => 
                t.Status !== 'Lunas' && t.Status !== 'Batal' && t.Status !== 'Selesai'
            );

            if (activeOrders.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 opacity-30">
                        <i data-lucide="check-circle" size="64" class="mb-4 mx-auto text-green-500"></i>
                        <p class="text-xl font-bold text-gray-400">DAPUR SEPI / SEMUA PESANAN SELESAI</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // Sort: Pending dulu (Merah), lalu Cooking (Kuning), lalu Ready (Hijau)
            // Di dalam group, sort berdasarkan waktu (terlama di atas)
            activeOrders.sort((a, b) => {
                const priority = { 'Menunggu Pembayaran': 1, 'Sedang Dimasak': 2, 'Siap Saji': 3 };
                return priority[a.Status] - priority[b.Status] || new Date(a.Tanggal) - new Date(b.Tanggal);
            });

            grid.innerHTML = activeOrders.map(trx => {
                let items = [];
                try { items = JSON.parse(trx.Item_JSON); } catch(e){}

                const dateOrder = new Date(trx.Tanggal);
                const elapsed = Math.floor((new Date() - dateOrder) / 60000); // menit

                // Tentukan style border berdasarkan status
                let borderClass = 'card-pending';
                if(trx.Status === 'Sedang Dimasak') borderClass = 'card-cooking';
                if(trx.Status === 'Siap Saji') borderClass = 'border-green-500';

                // Jika pesanan baru (kurang dari 1 menit), beri animasi pulse
                let isNew = elapsed < 1 && trx.Status === 'Menunggu Pembayaran';

                return `
                <div class="bg-gray-800 rounded-2xl overflow-hidden shadow-2xl ${borderClass} ${isNew ? 'new-order-pulse' : ''} flex flex-col">
                    <!-- Header Card -->
                    <div class="bg-gray-700/50 p-4 flex justify-between items-start border-b border-gray-700">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold uppercase bg-gray-700 px-2 py-1 rounded text-gray-300">
                                    ${trx.Tipe} - ${trx.Meja}
                                </span>
                                <span class="timer-badge text-xs font-mono text-gray-400">
                                    ${elapsed}m lalu
                                </span>
                            </div>
                            <h3 class="text-lg font-bold text-white">${trx.Pelanggan}</h3>
                        </div>
                        <div class="text-right">
                             <span class="block text-[10px] text-gray-500 uppercase font-bold">ID</span>
                             <span class="text-sm font-mono text-gray-300">#${trx.ID_Transaksi.split('-')[1].slice(-4)}</span>
                        </div>
                    </div>

                    <!-- List Item -->
                    <div class="p-4 space-y-3 flex-1 overflow-y-auto max-h-[300px]">
                        ${items.map(item => `
                            <div class="flex justify-between items-start bg-gray-700/30 p-2 rounded-lg">
                                <div>
                                    <p class="font-bold text-white text-sm">${item.Nama}</p>
                                    ${item.Catatan ? `<p class="text-xs text-yellow-400 italic">* ${item.Catatan}</p>` : ''}
                                </div>
                                <span class="bg-red-900/50 text-red-300 text-xs font-bold px-2 py-1 rounded">x${item.qty}</span>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Action Footer -->
                    <div class="p-3 bg-gray-900 border-t border-gray-700">
                        ${getActionButtons(trx)}
                    </div>
                </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function getActionButtons(trx) {
            if(trx.Status === 'Menunggu Pembayaran') {
                return `
                <button onclick="updateStatus('${trx.ID_Transaksi}', 'Sedang Dimasak')" 
                    class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                    <i data-lucide="flame" size="18"></i> MULAI MASAK
                </button>`;
            } else if (trx.Status === 'Sedang Dimasak') {
                return `
                <button onclick="updateStatus('${trx.ID_Transaksi}', 'Siap Saji')" 
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                    <i data-lucide="check" size="18"></i> SELESAI MASAK
                </button>`;
            } else if (trx.Status === 'Siap Saji') {
                return `
                <div class="flex items-center justify-center gap-2 text-green-400 font-bold text-center w-full">
                    <i data-lucide="bell-ring" class="animate-bounce"></i> MENUNGGU PELAYAN
                </div>
                <!-- Tombol reset khusus staf jika salah masuk -->
                <button onclick="updateStatus('${trx.ID_Transaksi}', 'Sedang Dimasak')" class="w-full text-xs text-gray-500 hover:text-white mt-2">
                    Kembalikan ke Dapur
                </button>`;
            }
        }

        function updateStats() {
            const pending = state.transaksi.filter(t => t.Status === 'Menunggu Pembayaran').length;
            const cooking = state.transaksi.filter(t => t.Status === 'Sedang Dimasak').length;
            const ready = state.transaksi.filter(t => t.Status === 'Siap Saji').length;

            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-cooking').innerText = cooking;
            document.getElementById('stat-ready').innerText = ready;
        }

        function refreshData() {
            syncKitchen();
        }

        function playNotification() {
            // Coba putar suara, browser mungkin block autoplay
            try {
                const audio = document.getElementById('bell-sound');
                audio.volume = 0.5;
                audio.play().catch(e => console.log("Audio blocked by browser"));
            } catch(e) {}
        }

        function logout() {
            if(confirm("Keluar dari sistem dapur?")) window.location.href = "index.html";
        }

        // --- AUTO REFRESH ---
        let syncInterval;
        window.addEventListener('load', () => {
            syncKitchen();
            // Refresh setiap 10 detik
            syncInterval = setInterval(syncKitchen, 10000);
        });

    </script>
</body>
</html>
