<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelayan - RM Pangkalan</title>
    
    <meta name="theme-color" content="#ffffff">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; /* Slate 100 - Light Background */
            color: #1e293b; /* Slate 800 - Dark Text */
        }

        /* --- TOAST STYLING (Light Mode) --- */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }
        .toast-item {
            pointer-events: auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            min-width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: translateX(120%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .toast-item.show { transform: translateX(0); }
        .toast-item.info { border-left: 4px solid #3b82f6; }
        .toast-item.success { border-left: 4px solid #52bc1a; }

        /* --- TABLE MAP STYLING (Light Mode) --- */
        .table-card {
            aspect-ratio: 1/1;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Empty Table */
        .table-empty {
            background: white;
            border: 2px dashed #cbd5e1;
            color: #94a3b8;
        }
        .table-empty:hover { border-color: #94a3b8; }

        /* Active Tables */
        .table-cooking {
            background: #fffbeb; /* Yellow 50 */
            border: 2px solid #f59e0b; /* Yellow 500 */
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }
        
        .table-ready {
            background: #f0fdf4; /* Emerald 50 */
            border: 2px solid #52bc1a; /* Emerald 500 */
            box-shadow: 0 0 20px rgba(82, 188, 26, 0.3);
            animation: strong-pulse 2s infinite;
            z-index: 10;
        }
        
        .table-eating {
            background: #eff6ff; /* Blue 50 */
            border: 2px solid #3b82f6; /* Blue 500 */
            box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.1);
        }

        @keyframes strong-pulse {
            0% { border-width: 2px; transform: scale(1); }
            50% { border-width: 4px; transform: scale(1.02); box-shadow: 0 0 30px rgba(82, 188, 26, 0.5); }
            100% { border-width: 2px; transform: scale(1); }
        }

        /* Modal Slide Up */
        .slide-up-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            border-radius: 2rem 2rem 0 0;
            transform: translateY(110%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.1);
        }
        .slide-up-modal.open { transform: translateY(0); }
        
        /* Custom Scrollbar for Light Mode */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6 min-h-screen">

    <!-- Audio Notifikasi -->
    <audio id="notification-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Navbar -->
    <header class="flex justify-between items-center mb-6 pb-4 border-b border-slate-200 sticky top-0 z-40 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-500/30">
                <i data-lucide="users" size="20"></i>
            </div>
            <div>
                <h1 class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight leading-none">FLOOR MANAGER</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5" id="sync-status">Monitoring Area...</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden lg:flex items-center gap-2 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-bold text-emerald-700">LIVE</span>
            </div>
            <button onclick="window.location.href='index.html'" class="w-10 h-10 rounded-xl bg-white text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 border border-slate-200 flex items-center justify-center transition active:scale-95">
                <i data-lucide="log-out" size="18"></i>
            </button>
        </div>
    </header>

    <!-- Stats & Filter -->
    <div class="flex flex-col lg:flex-row gap-4 mb-8 justify-between items-center">
        <div class="flex gap-2 w-full lg:w-auto bg-slate-200 p-1 rounded-xl">
            <button onclick="setFilter('all')" id="filter-all" class="flex-1 lg:flex-none px-4 py-2 rounded-lg bg-white text-slate-800 font-bold text-xs shadow-sm transition">SEMUA</button>
            <button onclick="setFilter('active')" id="filter-active" class="flex-1 lg:flex-none px-4 py-2 rounded-lg text-slate-500 hover:text-slate-800 font-bold text-xs hover:bg-white transition">AKTIF SAJA</button>
        </div>

        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 w-full lg:w-auto">
            <div class="bg-white border border-slate-200 rounded-xl px-4 py-2 min-w-[100px] text-center shadow-sm">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Total Meja</p>
                <p class="text-lg font-black text-slate-800">20</p>
            </div>
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-2 min-w-[100px] text-center">
                <p class="text-[10px] text-yellow-600 font-bold uppercase">Sedang Masak</p>
                <p class="text-lg font-black text-yellow-600" id="stat-cooking">0</p>
            </div>
            <div class="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2 min-w-[100px] text-center">
                <p class="text-[10px] text-emerald-600 font-bold uppercase">Siap Saji</p>
                <p class="text-lg font-black text-emerald-600" id="stat-ready">0</p>
            </div>
            <div class="bg-blue-50 border border-blue-200 rounded-xl px-4 py-2 min-w-[100px] text-center">
                <p class="text-[10px] text-blue-600 font-bold uppercase">Makan Sini</p>
                <p class="text-lg font-black text-blue-600" id="stat-eating">0</p>
            </div>
        </div>
    </div>

    <!-- Table Grid (Map) -->
    <div id="table-map" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 lg:gap-6 pb-24">
        <!-- Tables Generated by JS -->
    </div>

    <!-- Modal Table Detail -->
    <div id="table-detail-modal" class="slide-up-modal">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
            <div>
                <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">
                    <i data-lucide="armchair" class="text-emerald-600"></i> 
                    MEJA <span id="modal-table-num" class="text-emerald-600">01</span>
                </h2>
                <p class="text-xs text-slate-400 font-bold uppercase mt-1" id="modal-status">Status...</p>
            </div>
            <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-500 transition">
                <i data-lucide="x" size="20"></i>
            </button>
        </div>

        <div class="p-6 space-y-6">
            <!-- Customer Info -->
            <div class="bg-slate-50 rounded-xl p-4 border border-slate-200">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Pelanggan</p>
                <p class="text-lg font-bold text-slate-800" id="modal-customer">-</p>
                <div class="flex gap-4 mt-2 text-xs">
                    <span class="bg-white px-2 py-1 rounded text-slate-600 border border-slate-200" id="modal-time">-</span>
                    <span class="bg-white px-2 py-1 rounded text-slate-600 border border-slate-200" id="modal-type">-</span>
                </div>
            </div>

            <!-- Order Items -->
            <div>
                <p class="text-xs text-slate-400 font-bold uppercase mb-3">Isi Pesanan</p>
                <div id="modal-items" class="space-y-2">
                    <!-- Items Loaded via JS -->
                </div>
            </div>

            <!-- Total -->
            <div class="bg-emerald-50 rounded-xl p-4 border border-emerald-100 flex justify-between items-center">
                <span class="font-bold text-emerald-700 text-sm">Total Tagihan</span>
                <span class="text-2xl font-black text-emerald-700" id="modal-total">Rp 0</span>
            </div>
        </div>
    </div>

    <!-- Backdrop -->
    <div id="backdrop" onclick="closeModal()" class="fixed inset-0 bg-slate-900/20 z-50 hidden backdrop-blur-sm transition-opacity"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwN3BrT3us2zAikLxg5T9wmwi8yur5NDXdPU8o45Gn1WBv3uRl9uG4MxE1elZ47vchH/exec";
        const TOTAL_TABLES = 20;

        // --- TOAST MANAGER (LIGHT THEME) ---
        class ToastManager {
            constructor() { this.container = document.getElementById('toast-container'); }
            show(message, type = 'info', duration = 4000) {
                const toast = document.createElement('div');
                toast.className = `toast-item ${type}`;
                let icon = type === 'success' ? 'check-circle' : 'bell';
                let colorClass = type === 'success' ? 'text-emerald-600' : 'text-blue-600';
                
                toast.innerHTML = `
                    <i data-lucide="${icon}" class="${colorClass}" size="20"></i>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${message}</p>
                    </div>
                `;
                this.container.appendChild(toast);
                lucide.createIcons();
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, duration);
            }
        }
        const toast = new ToastManager();

        // --- APP STATE ---
        let state = {
            transaksi: [],
            tableStatus: {}, 
            filter: 'all',
            knownReadyOrders: new Set() // Untuk track notifikasi suara
        };

        // --- AUDIO NOTIFICATION ---
        function playNotificationSound() {
            try {
                const audio = document.getElementById('notification-sound');
                audio.volume = 0.5;
                audio.play().catch(e => console.log("Audio autoplay blocked by browser"));
            } catch(e) {}
        }

        // --- SYNC LOGIC ---
        async function syncWaiter() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'sync_all' })
                });
                const json = await res.json();

                if(json.status === 'success' && json.data && json.data.Transaksi) {
                    const trxData = json.data.Transaksi;
                    processTableStatus(trxData);
                    renderMap();
                    updateStats();
                    
                    // Cek Notifikasi Baru (Suara)
                    // Cari order baru yang statusnya 'Siap Saji' tapi belum di record sebelumnya
                    const currentReadyOrders = new Set(
                        trxData
                            .filter(t => t.Status === 'Siap Saji' && t.Tipe === 'DINEIN')
                            .map(t => t.ID_Transaksi)
                    );

                    let hasNew = false;
                    currentReadyOrders.forEach(id => {
                        if(!state.knownReadyOrders.has(id)) {
                            hasNew = true;
                        }
                    });

                    state.knownReadyOrders = currentReadyOrders;

                    if(hasNew) {
                        playNotificationSound();
                        toast.show("Makanan siap untuk disajikan!", "info");
                    }

                    document.getElementById('sync-status').innerText = "Live: " + new Date().toLocaleTimeString('id-ID');
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        // --- LOGIC: PROCESS TABLE STATUS ---
        function processTableStatus(transactions) {
            state.tableStatus = {};
            
            const dineInOrders = transactions.filter(t => 
                t.Tipe === 'DINEIN' && t.Status !== 'Batal' && t.Status !== 'Selesai'
            );

            dineInOrders.forEach(trx => {
                const tableNum = parseInt(trx.Meja);
                if(!tableNum || tableNum < 1 || tableNum > TOTAL_TABLES) return;

                let status = 'empty';
                let priority = 0;

                if(trx.Status === 'Siap Saji') {
                    status = 'ready'; priority = 3;
                } else if (trx.Status === 'Sedang Dimasak' || trx.Status === 'Menunggu Pembayaran') {
                    status = 'cooking'; priority = 2;
                } else if (trx.Status === 'Lunas') {
                    status = 'eating'; priority = 1;
                }

                if(!state.tableStatus[tableNum] || state.tableStatus[tableNum].priority < priority) {
                    state.tableStatus[tableNum] = {
                        status: status,
                        priority: priority,
                        data: trx
                    };
                }
            });
        }

        // --- RENDER MAP ---
        function renderMap() {
            const grid = document.getElementById('table-map');
            let html = '';

            for (let i = 1; i <= TOTAL_TABLES; i++) {
                const info = state.tableStatus[i];
                
                // Skip if filter active and table is empty
                if (state.filter === 'active' && !info) continue;

                let cardClass = 'table-empty';
                let icon = 'armchair';
                let text = 'KOSONG';
                let textClass = 'text-slate-400';

                if (info) {
                    if (info.status === 'ready') {
                        cardClass = 'table-ready';
                        icon = 'utensils-crossed';
                        text = 'SIAP SAJI';
                        textClass = 'text-emerald-600';
                    } else if (info.status === 'cooking') {
                        cardClass = 'table-cooking';
                        icon = 'flame';
                        text = 'SEDANG DIMASAK';
                        textClass = 'text-yellow-600';
                    } else if (info.status === 'eating') {
                        cardClass = 'table-eating';
                        icon = 'users';
                        text = 'MAKAN SINI';
                        textClass = 'text-blue-600';
                    }
                }

                html += `
                <div onclick="openTableDetail(${i})" class="table-card ${cardClass}">
                    <i data-lucide="${icon}" size="32" class="mb-2 ${textClass}"></i>
                    <h3 class="text-2xl font-black text-slate-800">0${i}</h3>
                    <p class="text-[10px] font-bold uppercase ${textClass} mt-1 tracking-wide">${text}</p>
                    
                    ${info && info.status === 'ready' ? '<span class="absolute top-2 right-2 w-3 h-3 bg-emerald-500 rounded-full animate-ping"></span>' : ''}
                </div>
                `;
            }

            grid.innerHTML = html;
            lucide.createIcons();
        }

        // --- MODAL & DETAILS ---
        function openTableDetail(tableNum) {
            const info = state.tableStatus[tableNum];
            const modal = document.getElementById('table-detail-modal');
            const backdrop = document.getElementById('backdrop');
            
            if(!info) {
                // Table Empty
                document.getElementById('modal-table-num').innerText = '0' + tableNum;
                document.getElementById('modal-status').innerText = 'MEJA KOSONG';
                document.getElementById('modal-customer').innerText = '-';
                document.getElementById('modal-items').innerHTML = '<p class="text-sm text-slate-400 italic">Belum ada pesanan.</p>';
                document.getElementById('modal-total').innerText = 'Rp 0';
            } else {
                const trx = info.data;
                
                document.getElementById('modal-table-num').innerText = '0' + tableNum;
                document.getElementById('modal-status').innerText = trx.Status;
                document.getElementById('modal-customer').innerText = trx.Pelanggan;
                
                const date = new Date(trx.Tanggal);
                document.getElementById('modal-time').innerText = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('modal-type').innerText = trx.Tipe;

                // Render Items
                let items = [];
                try { items = JSON.parse(trx.Item_JSON); } catch(e){}

                const itemsHtml = items.map(item => `
                    <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-slate-200">
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${item.Nama}</p>
                            ${item.Catatan ? `<p class="text-[10px] text-yellow-600 italic mt-0.5">* ${item.Catatan}</p>` : ''}
                        </div>
                        <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">x${item.qty}</span>
                    </div>
                `).join('');

                document.getElementById('modal-items').innerHTML = itemsHtml;
                document.getElementById('modal-total').innerText = formatRupiah(trx.Total);
            }

            modal.classList.add('open');
            backdrop.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('table-detail-modal').classList.remove('open');
            document.getElementById('backdrop').classList.add('hidden');
        }

        function setFilter(type) {
            state.filter = type;
            // Update Button Styles (Light Theme)
            document.getElementById('filter-all').className = `flex-1 lg:flex-none px-4 py-2 rounded-lg font-bold text-xs transition ${type === 'all' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-white'}`;
            document.getElementById('filter-active').className = `flex-1 lg:flex-none px-4 py-2 rounded-lg font-bold text-xs transition ${type === 'active' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-white'}`;
            renderMap();
        }

        function updateStats() {
            const counts = { cooking: 0, ready: 0, eating: 0 };
            
            Object.values(state.tableStatus).forEach(v => {
                if(v.status === 'cooking') counts.cooking++;
                if(v.status === 'ready') counts.ready++;
                if(v.status === 'eating') counts.eating++;
            });

            document.getElementById('stat-cooking').innerText = counts.cooking;
            document.getElementById('stat-ready').innerText = counts.ready;
            document.getElementById('stat-eating').innerText = counts.eating;
        }

        function formatRupiah(num) {
            return "Rp " + num.toLocaleString('id-ID');
        }

        // --- INIT ---
        let syncInterval;
        window.addEventListener('load', () => {
            syncWaiter();
            syncInterval = setInterval(syncWaiter, 10000); // 10 detik
        });

    </script>
</body>
</html>
