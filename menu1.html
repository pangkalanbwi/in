<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu Management - RM Pangkalan</title>
    
    <meta name="theme-color" content="#52bc1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; /* Sama dengan Index (Slate 50) */
            color: #1e293b;
            padding-bottom: 100px; /* Space untuk floating nav */
        }
        .hero-font { font-family: 'Playfair Display', serif; }

        /* --- ANIMASI PAGE --- */
        .page-view { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .page-view.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- FLOATING BOTTOM NAV (Floating Style) --- */
        .bottom-pill {
            position: fixed; 
            bottom: calc(24px + env(safe-area-inset-bottom)); 
            left: 50%; 
            transform: translateX(-50%);
            width: 90%; 
            max-width: 460px; 
            background: white;
            border-radius: 2.5rem;
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 10px 8px; 
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.02);
            z-index: 50; /* Floating di atas konten */
            border: 1px solid rgba(0,0,0,0.05);
        }
        .nav-btn { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #94a3b8; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-btn.active { color: #52bc1a; transform: translateY(-4px); }
        .nav-btn.active::after { 
            content: ''; 
            position: absolute; 
            bottom: -8px; 
            width: 5px; 
            height: 5px; 
            background: #52bc1a; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #52bc1a;
        }
        
        /* --- CARD STYLING --- */
        .data-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .data-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* --- INPUTS --- */
        .modern-input {
            width: 100%;
            padding: 0.75rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .modern-input:focus {
            background: white;
            border-color: #52bc1a;
            box-shadow: 0 0 0 2px rgba(82, 188, 26, 0.1);
            outline: none;
        }

        /* --- TABLE --- */
        .table-row { border-bottom: 1px solid #f1f5f9; }
        .table-row:last-child { border-bottom: none; }
        .th { text-left; text-[10px]; font-bold; text-slate-400; padding: 12px 0; }
        .td { text-left; padding: 12px 0; text-sm; text-slate-600; }
        .td-action { text-align: right; }

        /* --- BUTTONS --- */
        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .btn-edit { background: #e0f2fe; color: #0369a1; }
        .btn-edit:hover { background: #bae6fd; }
        .btn-delete { background: #fee2e2; color: #ef4444; }
        .btn-delete:hover { background: #fecaca; }
        .btn-add { background: #52bc1a; color: white; }
        .btn-add:hover { background: #3a8e12; }

        /* --- SCROLL --- */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="">

    <!-- Navbar -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200/50 py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-500/20">
                <i data-lucide="layout-grid" size="20"></i>
            </div>
            <div>
                <h1 class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight leading-none">MENU MANAGEMENT</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Manajemen Stok & Resep</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='owner.html'" class="text-slate-400 hover:text-emerald-600 font-bold text-xs flex items-center gap-1">
                <i data-lucide="arrow-left"></i> KEMBALI
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="p-6 pb-10">
        
        <!-- TAB: DAFTAR MENU -->
        <div id="view-menu" class="page-view active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800">Daftar Menu</h2>
                <button onclick="promptAddMenu()" class="btn-action btn-add text-xs">
                    <i data-lucide="plus" size="16"></i> TAMBAH
                </button>
            </div>

            <!-- Search -->
            <div class="bg-white p-3 rounded-xl border border-slate-200 mb-6 flex items-center gap-3 shadow-sm">
                <i data-lucide="search" class="text-slate-400" size="18"></i>
                <input type="text" id="search-menu-input" oninput="renderMenuList()" placeholder="Cari nama menu..." class="w-full bg-transparent border-none outline-none text-sm font-bold text-slate-600 placeholder:text-slate-300">
            </div>

            <!-- Table Container -->
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th class="text-slate-400">Nama Menu</th>
                            <th class="text-slate-400 text-right">Harga</th>
                            <th class="text-slate-400 text-right">Kategori</th>
                            <th class="text-slate-400 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="menu-table-body">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB: MANAJEMEN STOK -->
        <div id="view-stock" class="page-view">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800">Stok Bahan</h2>
                <button onclick="promptAddStock()" class="btn-action btn-add text-xs">
                    <i data-lucide="package-plus" size="16"></i> TAMBAH BAHAN
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="stock-grid">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- TAB: RESEP (Resep) -->
        <div id="view-recipe" class="page-view">
            <div class="text-center py-20">
                <i data-lucide="book-open" size="64" class="text-slate-300 mx-auto mb-4"></i>
                <h2 class="text-2xl font-black text-slate-800 mb-2">Manajemen Resep</h2>
                <p class="text-slate-500 text-sm max-w-md mx-auto">Hubungkan ID Menu dengan ID Bahan untuk memotong stok otomatis saat terjual.</p>
                <button onclick="connectRecipePrompt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-emerald-200 text-sm mt-4">
                    <i data-lucide="link-2" class="inline mr-2"></i> BUAT KONEKSI BARU
                </button>
            </div>
            <div id="recipe-list" class="grid grid-cols-1 gap-4 mt-6">
                <!-- Recipe Cards -->
            </div>
        </div>

    </main>

    <!-- FLOATING BOTTOM NAV (HP & TABLET) -->
    <nav class="bottom-pill">
        <!-- Dashboard/Owner -->
        <button onclick="window.location.href='owner.html'" id="nav-dashboard" class="nav-btn">
            <i data-lucide="pie-chart" size="24"></i><span class="text-[9px] mt-1 font-bold">Owner</span>
        </button>
        
        <!-- Menu -->
        <button onclick="router('menu')" id="nav-menu" class="nav-btn active">
            <i data-lucide="utensils" size="24"></i><span class="text-[9px] mt-1 font-bold">Menu</span>
        </button>
        
        <!-- Stock -->
        <button onclick="router('stock')" id="nav-stock" class="nav-btn">
            <i data-lucide="package" size="24"></i><span class="text-[9px] mt-1 font-bold">Stok</span>
        </button>
        
        <!-- Recipe -->
        <button onclick="router('recipe')" id="nav-recipe" class="nav-btn">
            <i data-lucide="book-open" size="24"></i><span class="text-[9px] mt-1 font-bold">Resep</span>
        </button>
        
        <!-- Back to Index -->
        <button onclick="window.location.href='index.html'" id="nav-home" class="nav-btn">
            <i data-lucide="home" size="24"></i><span class="text-[9px] mt-1 font-bold">Home</span>
        </button>
    </nav>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwN3BrT3us2zAikLxg5T9wmwi8yur5NDXdPU8o45Gn1WBv3uRl9uG4MxE1elZ47vchH/exec";

        let state = {
            menu: [],
            stock: [],
            recipes: [] // Mocking recipes list for simplicity, usually fetched from sheet 'Resep'
        };

        // --- NAVIGATION ---
        function router(view) {
            // Hide all views
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Show target
            const target = document.getElementById('view-' + view);
            if(target) target.classList.add('active');
            
            const navBtn = document.getElementById('nav-' + view);
            if(navBtn) navBtn.classList.add('active');
            
            window.scrollTo(0,0);
        }

        // --- TOAST ---
        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl z-50 text-xs font-bold uppercase tracking-widest flex items-center gap-2 transition-all duration-500 transform translate-y-0 opacity-100';
            toast.style.transform = 'translate(-50%, -100%) opacity-0'; // Start hidden
            
            // Color variants
            if(type === 'success') toast.classList.add('border-l-4', 'border-emerald-500');
            if (type === 'error') toast.classList.add('border-l-4', 'border-red-500');

            toast.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'info'}" class="${type==='success'?'text-emerald-400':'text-blue-400'}"></i> <span>${msg}</span>`;
            
            container.appendChild(toast);
            
            lucide.createIcons();
            
            // Animate In
            requestAnimationFrame(() => {
                toast.style.transform = 'translate(-50%, -50%) opacity-100';
            });
            
            // Auto Remove
            setTimeout(() => {
                toast.style.transform = 'translate(-50%, -80%) opacity-0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- SYNC LOGIC ---
        async function syncData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'sync_all' })
                });
                const json = await res.json();
                
                if(json.status === 'success' && json.data) {
                    state.menu = json.data.Menu || [];
                    state.stock = json.data.Stok || [];
                    
                    renderMenuList();
                    renderStockGrid();
                    // Recipe logic: In a real app, you fetch json.data.Resep
                    // Here we simulate recipes based on menu items for demo
                    state.recipes = state.menu.map(m => ({ id: m.ID, name: m.Nama, stockId: 'B01' })); // Mock linking
                    
                    renderRecipeList();
                }
            } catch(e) {
                console.error("Sync Error", e);
                showToast("Gagal sinkronisasi data", 'error');
            }
        }

        // --- MENU CRUD ---
        function renderMenuList() {
            const tbody = document.getElementById('menu-table-body');
            tbody.innerHTML = '';
            
            state.menu.forEach((m, index) => {
                const tr = document.createElement('tr');
                tr.className = 'table-row group hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="font-bold text-slate-700">${m.Nama}</td>
                    <td class="text-right font-bold text-slate-600">${formatRupiah(m.Harga)}</td>
                    <td class="text-right"><span class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">${m.Kategori}</span></td>
                    <td class="td-action">
                        <button onclick="deleteMenu('${m.ID}')" class="text-red-500 hover:bg-red-50 p-1.5 rounded-lg"><i data-lucide="trash-2" size="16"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function promptAddMenu() {
            const nama = prompt("Nama Menu Baru:");
            const harga = prompt("Harga Jual (Angka):");
            const kategori = prompt("Kategori (Makanan/Segeran/Wedangan/Camilan):") || "Makanan";
            const desc = prompt("Deskripsi:");
            
            if (nama && harga && kategori) {
                addMenuToAPI({ Nama, Harga: parseInt(harga), Kategori: kategori, Deskripsi: desc || '-' });
            }
        }

        async function deleteMenu(id) {
            if(!confirm("Hapus menu ini?")) return;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'delete_data',
                        data: { targetSheet: 'Menu', id: id }
                    })
                });
                showToast("Menu berhasil dihapus", 'success');
                syncData();
            } catch (e) {
                showToast("Gagal menghapus menu", 'error');
            }
        }

        // --- STOCK CRUD ---
        function renderStockGrid() {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';
            
            state.stock.forEach(s => {
                const div = document.createElement('div');
                div.className = 'data-card p-6 flex flex-col justify-between';
                
                const statusColor = (parseInt(s.Stok_Sisa) < 10) ? 'text-red-500' : 'text-emerald-500';
                const stockVal = parseInt(s.Stok_Sisa) || 0;
                const isLow = stockVal < 10;

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h4 class="text-lg font-bold text-slate-800">${s.Nama_Bahan}</h4>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${s.Kategori || 'Umum'}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black ${statusColor}">${s.Stok_Sisa}</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase">Unit</span>
                        </div>
                    </div>
                    <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden mb-4">
                        <div class="h-full bg-emerald-500" style="width: ${Math.min(100, stockVal)}%"></div>
                    </div>
                    <button onclick="editStockPrompt('${s.ID_Bahan}')" class="text-slate-400 hover:text-emerald-600 mt-2 text-xs font-bold flex items-center gap-1">
                        <i data-lucide="edit-2" size="14"></i> Edit / Tambah Stok
                    </button>
                `;
                grid.appendChild(div);
            });
        }

        function editStockPrompt(id) {
            const current = state.stock.find(s => s.ID_Bahan === id);
            const newVal = prompt(`Edit jumlah stok untuk ${current.Nama_Bahan}:`, current.Stok_Sisa);
            
            if (newVal !== null) {
                updateData('Stok', id, 'Stok_Sisa', newVal);
            }
        }

        function promptAddStock() {
            const id = "B" + Math.floor(Math.random() * 1000); // Auto ID
            const nama = prompt("Nama Bahan:");
            const kategori = prompt("Kategori (Sayur/Daging):");
            const stok = prompt("Jumlah Awal:");
            
            if(nama && kategori && stok) {
                updateData('Stok', id, 'Stok_Sisa', stok); // Simple update, assuming ID exists
                // In real app, you need to fetch ID first or use 'add_data' which uses row object
                // For now, let's assume add_data requires full row object
                
                addData('Stok', { ID_Bahan: id, Nama_Bahan: nama, Kategori: kategori, Stok_Sisa: stok, Satuan: 'Pcs' });
            }
        }

        function addData(sheet, rowObj) {
            // Helper untuk add_data (assuming rowObj keys match sheet columns)
            // In real implementation, pass specific values to add_data endpoint
            // Using generic save logic for demo
            if(confirm("Simpan: Menambahkan data ke sheet " + sheet + "?")) {
                showToast("Simulasi: Data ditambahkan", 'success');
                // Real fetch to API...
            }
        }

        function updateData(sheet, id, column, val) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'update_data',
                    data: { targetSheet: sheet, id: id, column: column, newValue: val }
                })
            })
            .then(() => syncData())
            .catch(e => showToast("Gagal update", 'error'));
        }

        // --- RESEP (RECIPE) ---
        function renderRecipeList() {
            const list = document.getElementById('recipe-list');
            list.innerHTML = '';

            state.recipes.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'data-card p-6 relative';
                div.innerHTML = `
                    <div class="absolute top-4 right-4 bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-1 rounded-full border border-slate-200">
                        ID: ${r.id}
                    </div>
                    <h4 class="text-lg font-black text-slate-800 pr-12">${r.name}</h4>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <span class="px-2 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-lg border border-emerald-200">
                            <i data-lucide="package" size="12"></i> ${r.stockId}
                        </span>
                        <button onclick="deleteRecipe('${r.id}')" class="ml-auto text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function connectRecipePrompt() {
            const menuId = prompt("Masukkan ID Menu (Contoh: M01):");
            const bahanId = prompt("Masukkan ID Bahan (Contoh: B01):");
            
            if(menuId && bahanId) {
                addData('Resep', { 
                    ID_Menu: menuId, 
                    Nama_Menu: state.menu.find(m=>m.ID===menuId)?.Nama || 'Unknown', 
                    ID_Bahan: bahanId, 
                    Nama_Bahan: state.stock.find(s=>s.ID_Bahan===bahanId)?.Nama_Bahan || 'Unknown',
                    Jumlah: 1, 
                    Keterangan: 'Auto generated via Menu 1'
                });
                showToast("Resep berhasil ditambahkan!", "success");
            }
        }

        function deleteRecipe(id) {
            if(confirm("Hapus koneksi resep ini?")) {
                updateData('Resep', id, null, null); // Simplified delete logic for demo (API needs specific ID handling usually)
                showToast("Resep dihapus", "success");
                // Since delete_data in code.gs takes just ID, we might need to pass a known ID or refetch list
                syncData();
            }
        }

        // --- INIT ---
        window.addEventListener('load', () => {
            syncData();
            lucide.createIcons();
            
            // Sync loop
            setInterval(syncData, 10000);
        });

        function formatRupiah(num) {
            return "Rp " + num.toLocaleString('id-ID');
        }
    </script>
</body>
</html>
